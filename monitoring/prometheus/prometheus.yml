global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: jarvis-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway:8080
        labels:
          service: gateway-pro
          env: prod
