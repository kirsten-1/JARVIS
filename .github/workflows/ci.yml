name: gateway-pro-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: gateway-pro-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepush-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lightweight prepush guard
        run: ./scripts/a10_ci_guard.sh

      - name: Upload guard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a10-prepush-report
          path: docs/reports/a08_prepush_*.md
          if-no-files-found: ignore

  backend-test:
    runs-on: ubuntu-latest
    needs: prepush-guard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

  frontend-build:
    runs-on: ubuntu-latest
    needs: prepush-guard
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build frontend
        run: npm run build
