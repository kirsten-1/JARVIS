services:
  mysql:
    image: mysql:8.0.39
    container_name: jarvis-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_DATABASE: jarvis
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: jarvis-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-gateway
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      MYSQL_URL: jdbc:mysql://mysql:3306/jarvis?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JARVIS_JWT_SECRET: ${JARVIS_JWT_SECRET:-change-me-please-change-me-please-change-me}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-local}
      AI_LOCAL_ENABLED: ${AI_LOCAL_ENABLED:-true}
      AI_LOCAL_BASE_URL: ${AI_LOCAL_BASE_URL:-http://host.docker.internal:8000}
      AI_LOCAL_CHAT_PATH: ${AI_LOCAL_CHAT_PATH:-/v1/chat}
      AI_LOCAL_STREAM_PATH: ${AI_LOCAL_STREAM_PATH:-/v1/chat/stream}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jarvis-frontend
    depends_on:
      - gateway
    ports:
      - "5173:80"

volumes:
  mysql_data:
  redis_data:
